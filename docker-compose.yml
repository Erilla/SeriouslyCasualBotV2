services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    volumes:
      - bot-data:/app/data
      - ./db.sqlite:/app/db.sqlite

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  bot-data:
  redis-data:
